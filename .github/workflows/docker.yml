name: docker

# Build multi-arch (linux/amd64 + linux/arm64) images for api and web on
# every push to main and on PRs that touch infra/docker or app source.
# Pushes to GHCR are gated on the PUSH_GHCR repo variable (set to '1' when
# you're ready to publish); otherwise we build-only to verify cross-arch
# compilation still works.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'infra/docker/**'
      - 'infra/caddy/**'
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: infra/docker/Dockerfile.api
            image: home-os-api
          - service: web
            dockerfile: infra/docker/Dockerfile.web
            image: home-os-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: vars.PUSH_GHCR == '1' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build (and conditionally push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ vars.PUSH_GHCR == '1' && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
