name: deploy

# Auto-deploy to the home Pi on every push to main (after CI passes).
# Flow:
#   1. Wait for `ci.yml` on the same SHA to complete successfully.
#   2. Join the tailnet as an ephemeral node.
#   3. SSH to the Pi and run scripts/deploy.sh (pulls, builds, migrates,
#      restarts home-os-api.service).
#
# Required repo secrets:
#   TAILSCALE_OAUTH_CLIENT_ID   — Tailscale OAuth client ID (scopes: devices:write)
#   TAILSCALE_OAUTH_SECRET      — Tailscale OAuth client secret
#   PI_SSH_PRIVATE_KEY          — ed25519 private key authorised on the Pi
#   PI_HOST                     — tailnet hostname (e.g., pi4.tailebbd07.ts.net)
#   PI_USER                     — Linux user on the Pi (owns the checkout)
#
# Optional:
#   TAILSCALE_TAGS              — ACL tag for the runner (default: tag:ci)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for ci workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: build-test
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

  deploy:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: ${{ vars.TAILSCALE_TAGS || 'tag:ci' }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.PI_SSH_PRIVATE_KEY }}" > ~/.ssh/pi
          chmod 600 ~/.ssh/pi

      - name: Deploy
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USER }}
        run: |
          # Resolve PI_HOST to its tailnet 100.x IP via `tailscale ip`.
          # The ephemeral runner's MagicDNS resolver isn't always reliable;
          # the tailnet IP always works. PI_HOST may be a FQDN
          # ("pi4.tailebbd07.ts.net") or a short name ("pi4") — strip any
          # trailing suffix.
          SHORT="${PI_HOST%%.*}"
          for i in 1 2 3 4 5; do
            PI_IP="$(tailscale ip -4 "$SHORT" 2>/dev/null | head -n1 || true)"
            if [ -n "$PI_IP" ]; then break; fi
            echo "tailscale ip: waiting for $SHORT to be visible on the tailnet (attempt $i)..."
            sleep 3
          done
          if [ -z "$PI_IP" ]; then
            echo "ERROR: could not resolve $SHORT on the tailnet." >&2
            tailscale status >&2 || true
            exit 1
          fi
          echo "Resolved $SHORT -> $PI_IP"
          ssh -i ~/.ssh/pi \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              "${PI_USER}@${PI_IP}" \
              'cd ~/repos/home-os && scripts/deploy.sh'
