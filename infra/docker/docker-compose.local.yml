# home-os — LOCAL DEV OVERRIDE for the production Docker Compose stack.
#
# Layer this on top of docker-compose.yml to smoke-test the prod api + web
# containers against http://localhost without needing GHCR images, a Tailnet
# hostname, Caddy's self-signed cert, or Litestream S3 credentials.
#
# Usage:
#
#   docker compose \
#     -f infra/docker/docker-compose.yml \
#     -f infra/docker/docker-compose.local.yml \
#     --env-file .env \
#     up --build
#
#   # Then open http://localhost:8080
#   # API also directly reachable at http://localhost:4000/health/live
#
# What this override does:
#   - Builds api + web + migrate from local Dockerfiles (no GHCR pull required).
#     Because compose will build AND tag using the `image:` string already set
#     in the base file, we don't need to reset the image field.
#   - Hides the production caddy + litestream via `profiles: [never]` and
#     introduces a plain-HTTP `caddy-local` service on :8080 that accepts
#     any Host header.
services:
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    # Expose the api directly too, so you can curl http://localhost:4000/health/live.
    ports:
      - '4000:4000'
    environment:
      HOME_OS_WEB_ORIGIN: ${HOME_OS_WEB_ORIGIN_LOCAL:-http://localhost:8080}

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web

  # Hide production services in local mode (they expect tailnet/S3 config).
  caddy:
    profiles: ['prod-only']
  litestream:
    profiles: ['prod-only']

  # Local reverse proxy on plain HTTP :8080.
  caddy-local:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - '8080:8080'
    volumes:
      - ../caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_local_data:/data
      - caddy_local_config:/config

volumes:
  caddy_local_data:
  caddy_local_config:
